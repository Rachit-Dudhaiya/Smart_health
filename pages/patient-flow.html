<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Flow | Smart Health</title>
    <link rel="stylesheet" href="../styles.css" />
</head>

<body data-page="patient">
    <header class="site-header">
        <div class="container nav-row">
            <a href="../index.html" class="brand">
                <span class="brand-icon">🏥</span>
                <span>Smart Health</span>
            </a>
            <button class="menu-toggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <nav class="site-nav">
                <a href="../index.html">Home</a>
                <a href="medicine-stock.html">Medicine Stock</a>
                <a href="patient-flow.html" class="active">Patient Flow</a>
                <a href="bed-availability.html">Bed Availability</a>
                <a href="doctor-attendance.html">Doctor Attendance</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <p class="eyebrow">Patient flow monitoring</p>
                <h1>Optimize waiting time and service routing.</h1>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="period-select">View</label>
                <select id="period-select" class="filter-select">
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
            </div>

            <section id="stats-grid" class="stats-row"></section>

            <section class="card-grid two-up">
                <article class="card wide-card">
                    <h3>Daily activity</h3>
                    <div id="flow-bars" class="bar-chart"></div>
                </article>
                <article class="card">
                    <h3>Hot spots</h3>
                    <div id="flow-highlights" class="data-list"></div>
                </article>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-row">
            <p>© <span id="year"></span> Smart Health</p>
            <a href="contact.html">Contact us</a>
        </div>
    </footer>

    <script src="../script.js"></script>
</body>

</html>
