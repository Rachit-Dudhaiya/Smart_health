<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Notifications | Smart Health</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/css/styles.css?v=1783530550932" />
</head>
<body data-path-prefix="../" data-restricted-roles="admin,doctor,pharmacist,patient">
    
    <div class="container" style="padding: 4rem 0; max-width: 800px;">
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <div>
                <p class="eyebrow">User Alerts</p>
                <h1>My Notifications</h1>
            </div>
            
            <button id="mark-all-read-btn" class="btn btn-secondary" style="display: none;">Mark All as Read</button>
        </div>
        
        <div id="notifications-container">
            <!-- Injected dynamically -->
        </div>
        
        <!-- Pagination controls -->
        <div id="pagination-container" style="margin-top: 2rem; display: flex; justify-content: center; gap: 0.5rem;">
            <!-- Injected dynamically -->
        </div>
    </div>

    <!-- Site Core Client Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/layout.js"></script>
    
    <script>
        const itemsPerPage = 10;
        let currentPage = 1;
        let userNotifs = [];

        document.addEventListener('DOMContentLoaded', () => {
            const curUser = db.getCurrentUser();
            if (!curUser) return;
            
            const markAllBtn = document.getElementById('mark-all-read-btn');
            
            // Mark all read listener
            markAllBtn.addEventListener('click', () => {
                db.markNotificationsAsRead(curUser.id);
                showToast('All notifications marked as read.', 'success');
                // Reload nav header to update badge count
                const badge = document.querySelector('.notif-count');
                if (badge) badge.textContent = '0';
                
                loadAndRenderNotifications(curUser);
            });
            
            loadAndRenderNotifications(curUser);
        });
        
        function loadAndRenderNotifications(curUser) {
            const allNotifs = db.getNotifications();
            // Filter by current user
            userNotifs = allNotifs.filter(n => n.user_id === curUser.id).reverse();
            
            const markAllBtn = document.getElementById('mark-all-read-btn');
            if (userNotifs.length > 0) {
                markAllBtn.style.display = 'block';
            } else {
                markAllBtn.style.display = 'none';
            }
            
            renderPage();
        }
        
        function renderPage() {
            const container = document.getElementById('notifications-container');
            const pagContainer = document.getElementById('pagination-container');
            
            if (userNotifs.length === 0) {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 4rem 2rem;">
                        <p class="auth-subtitle">No notifications found.</p>
                        <p style="margin-top: 0.5rem; font-size: 0.9rem;">You are all caught up! Clinical updates or doctor shift changes will appear here.</p>
                    </div>
                `;
                pagContainer.innerHTML = '';
                return;
            }
            
            // Paginate
            const totalPages = Math.ceil(userNotifs.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, userNotifs.length);
            const pageItems = userNotifs.slice(startIndex, endIndex);
            
            let html = '<div style="display: flex; flex-direction: column; gap: 1rem;">';
            pageItems.forEach(notif => {
                const dt = new Date(notif.created_at).toLocaleString();
                html += `
                    <div class="card" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid ${notif.is_read ? 'var(--color-border)' : 'var(--color-primary)'};">
                        <div style="flex: 1; padding-right: 1.5rem;">
                            <p style="color: var(--color-text-main); font-weight: ${notif.is_read ? '500' : '700'}; font-size: 0.95rem;">
                                ${notif.message}
                            </p>
                            <span style="font-size: 0.75rem; color: var(--color-text-muted); display: block; margin-top: 0.4rem;">
                                <span class="material-icons notranslate" aria-hidden="true" style="font-size: 0.9rem; vertical-align: middle; margin-right: 0.15rem;">schedule</span>${dt}
                            </span>
                        </div>
                        
                        <div style="display: flex; gap: 0.5rem;">
                            ${!notif.is_read ? `
                                <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" title="Mark as Read" onclick="markRead(${notif.id})"><span class="material-icons notranslate" aria-hidden="true" style="font-size: 1rem;">check</span></button>
                            ` : ''}
                            <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-color: var(--color-danger); color: var(--color-danger);" title="Delete" onclick="deleteNotif(${notif.id})">&times;</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            
            // Render Pagination Buttons
            if (totalPages > 1) {
                let pagHtml = '';
                for (let i = 1; i <= totalPages; i++) {
                    pagHtml += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-secondary'}" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="changePage(${i})">${i}</button>`;
                }
                pagContainer.innerHTML = pagHtml;
            } else {
                pagContainer.innerHTML = '';
            }
        }
        
        window.changePage = function(pageNumber) {
            currentPage = pageNumber;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        window.markRead = function(id) {
            const notifs = db.getNotifications();
            const idx = notifs.findIndex(n => n.id === id);
            if (idx !== -1) {
                notifs[idx].is_read = true;
                db.saveNotifications(notifs);
                showToast('Notification marked as read.', 'success');
                
                // Update nav badge count
                const curUser = db.getCurrentUser();
                const badge = document.querySelector('.notif-count');
                if (badge && curUser) {
                    badge.textContent = db.getUnreadNotificationsCount(curUser.id);
                }
                
                loadAndRenderNotifications(curUser);
            }
        };
        
        window.deleteNotif = function(id) {
            if (confirm('Are you sure you want to delete this notification?')) {
                let notifs = db.getNotifications();
                notifs = notifs.filter(n => n.id !== id);
                db.saveNotifications(notifs);
                showToast('Notification deleted.', 'success');
                
                // Update nav badge count
                const curUser = db.getCurrentUser();
                const badge = document.querySelector('.notif-count');
                if (badge && curUser) {
                    badge.textContent = db.getUnreadNotificationsCount(curUser.id);
                }
                
                loadAndRenderNotifications(curUser);
            }
        };
    </script>
</body>
</html>
