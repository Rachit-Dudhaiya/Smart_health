<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Health Gallery | Smart Health</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body data-path-prefix="../">
    
    <div class="container" style="padding: 4rem 0;">
        <div class="page-header" style="text-align: center; margin-bottom: 3rem;">
            <p class="eyebrow">Smart Hub Facility</p>
            <h1>Smart Health Gallery</h1>
            <p class="auth-subtitle">Real photos showcasing our equipment, care beds, pharmacies, and clean workspaces.</p>
        </div>

        <!-- Admin Upload Section -->
        <div id="admin-upload-panel" class="card" style="margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto; display: none;">
            <h3>CMS: Upload Gallery Image</h3>
            <form id="upload-form" class="auth-form" style="margin-top: 1.5rem;">
                <label>
                    Image Caption / Title
                    <input type="text" id="upload-caption" placeholder="e.g. ICU Ward Block B" required />
                </label>
                
                <label>
                    Select Image File (JPG, PNG, WEBP; Max 3MB)
                    <input type="file" id="upload-file" accept="image/jpeg, image/png, image/webp" required />
                </label>
                
                <button type="submit" class="btn btn-primary">Upload to Gallery</button>
            </form>
        </div>

        <!-- Display Images -->
        <div id="gallery-container">
            <!-- Injected dynamically -->
        </div>
    </div>

    <!-- Site Core Client Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const curUser = db.getCurrentUser();
            const adminPanel = document.getElementById('admin-upload-panel');
            
            // Show upload panel to admins
            if (curUser && curUser.role === 'admin') {
                adminPanel.style.display = 'block';
            }
            
            // Render gallery
            renderGallery(curUser);
            
            // Handle form submit
            const form = document.getElementById('upload-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const caption = document.getElementById('upload-caption').value.trim();
                const fileInput = document.getElementById('upload-file');
                const file = fileInput.files[0];
                
                if (!caption || !file) {
                    showToast('All fields are required.', 'error');
                    return;
                }
                
                // Max size check (3MB)
                if (file.size > 3 * 1024 * 1024) {
                    showToast('Image size exceeds 3MB limit.', 'error');
                    return;
                }
                
                // Read as base64 string
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const base64Data = evt.target.result;
                    const res = db.addGalleryImage(caption, base64Data);
                    
                    if (res.success) {
                        showToast('Image uploaded successfully!', 'success');
                        form.reset();
                        renderGallery(curUser);
                    } else {
                        showToast(res.message || 'Failed to upload image.', 'error');
                    }
                };
                reader.readAsDataURL(file);
            });
        });
        
        function renderGallery(curUser) {
            const container = document.getElementById('gallery-container');
            const images = db.getGallery();
            const isAdmin = curUser && curUser.role === 'admin';
            
            if (images.length > 0) {
                let html = '<div class="gallery-grid">';
                images.forEach(img => {
                    html += `
                        <div class="gallery-item">
                            <img src="${img.path}" alt="${img.caption}" loading="lazy" />
                            <div class="gallery-caption">
                                ${img.caption}
                                ${isAdmin ? `
                                    <button class="btn btn-danger" style="padding: 0.2rem 0.6rem; font-size: 0.75rem; margin-top: 0.5rem; display: block; width: 100%;" onclick="deleteImage(${img.id})">Delete</button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } else {
                container.innerHTML = `
                    <div class="card" style="text-align: center; padding: 4rem 2rem;">
                        <p class="auth-subtitle">The gallery is currently empty.</p>
                        ${isAdmin ? `
                            <p style="margin-top: 1rem;">Use the panel above to upload the first photo.</p>
                        ` : `
                            <p style="margin-top: 1rem;">Admin has not uploaded any facility images yet. Please check back later.</p>
                        `}
                    </div>
                `;
            }
        }
        
        // Expose delete function to window
        window.deleteImage = function(id) {
            if (confirm('Are you sure you want to delete this image?')) {
                const res = db.deleteGalleryImage(id);
                if (res.success) {
                    showToast('Image deleted successfully.', 'success');
                    renderGallery(db.getCurrentUser());
                } else {
                    showToast(res.message || 'Failed to delete image.', 'error');
                }
            }
        };
    </script>
</body>
</html>
