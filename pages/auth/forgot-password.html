</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Smart Health</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/styles.css" />
</head>
<body data-path-prefix="../../">
    
    <div class="container auth-shell">
        <div class="auth-card">
            <p class="eyebrow">Recovery</p>
            <h1>Forgot Password?</h1>
            <p class="auth-subtitle">Enter your registered email address and we will generate a recovery link.</p>
            
            <div id="forgot-error-msg" class="auth-message auth-message-error" style="display: none;"></div>
            <div id="forgot-info-msg" class="auth-message" style="display: none;"></div>
            
            <div id="dev-helper-msg" class="auth-message" style="background-color: #fef3c7; color: #92400e; border: 1px solid #f59e0b; text-align: left; display: none;">
                ⚙️ <strong>DEV_MODE HELPER</strong>:<br/>
                We detected local environment setup. Here is the reset link:<br/>
                <a id="dev-reset-link" href="#" style="font-weight: 700; text-decoration: underline; color: #b45309;">Reset Password Link</a>
            </div>
            
            <form id="forgot-form" class="auth-form">
                <label>
                    Email Address
                    <input type="email" id="forgot-email" placeholder="you@example.com" required autofocus />
                </label>
                
                <button class="btn btn-primary btn-full" type="submit">Request Reset Link</button>
            </form>
            
            <p class="auth-link"><a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <!-- Site Core Client Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/db.js"></script>
    <script src="../../assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgot-form');
            const errorMsg = document.getElementById('forgot-error-msg');
            const infoMsg = document.getElementById('forgot-info-msg');
            const devHelper = document.getElementById('dev-helper-msg');
            const devResetLink = document.getElementById('dev-reset-link');
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const email = document.getElementById('forgot-email').value.trim();
                if (!email) {
                    errorMsg.textContent = 'Please enter your email.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                const users = db.getUsers();
                const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
                
                // Uniform notice
                errorMsg.style.display = 'none';
                infoMsg.textContent = 'If this email matches an active account, password recovery instructions have been prepared.';
                infoMsg.style.display = 'block';
                
                if (user) {
                    const token = 'mock_reset_' + Math.random().toString(36).substring(2, 15);
                    const expires = new Date();
                    expires.setHours(expires.getHours() + 1); // 1 hour
                    
                    // Save mock token
                    const idx = users.findIndex(u => u.id === user.id);
                    users[idx].reset_token = token;
                    users[idx].reset_token_expires = expires.toISOString();
                    db.saveUsers(users);
                    
                    // Show Dev helper link
                    devResetLink.href = `reset-password.html?token=${token}`;
                    devHelper.style.display = 'block';
                    db.logActivity('Forgot password token requested (Simulated)', user.id);
                } else {
                    devHelper.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
