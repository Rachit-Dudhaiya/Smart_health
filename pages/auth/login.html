<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Smart Health</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/styles.css" />
</head>
<body data-path-prefix="../../">
    
    <div class="container auth-shell">
        <div class="auth-card">
            <p class="eyebrow">Secure Access</p>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to check clinic stocks, ward vacancies, and doctor coverage.</p>
            
            <div id="login-error-msg" class="auth-message auth-message-error" style="display: none;"></div>
            
            <form id="login-form" class="auth-form" novalidate>
                <label>
                    Email Address
                    <input type="email" id="login-email" placeholder="you@example.com" required autofocus />
                </label>
                
                <label>
                    Password
                    <div class="password-input-container" style="position: relative; width: 100%;">
                        <input type="password" id="login-password" placeholder="••••••••" required style="padding-right: 2.75rem;" />
                        <button type="button" class="password-toggle-btn" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-muted); display: flex; align-items: center; justify-content: center; padding: 4px;" aria-label="Toggle password visibility">
                            <span class="material-icons" style="font-size: 1.25rem;">visibility</span>
                        </button>
                    </div>
                </label>
                
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                    <label style="flex-direction: row; gap: 0.5rem; cursor: pointer; align-items: center;">
                        <input type="checkbox" id="login-remember" style="width: auto;" /> Remember me
                    </label>
                    <a href="forgot-password.html" style="font-size: 0.85rem; color: var(--color-primary); font-weight: 600;">Forgot Password?</a>
                </div>
                
                <button class="btn btn-primary btn-full" type="submit">Sign In</button>
            </form>
            
            <p class="auth-link">New to Smart Health? <a href="register.html">Create an Account</a></p>
        </div>
    </div>

    <!-- Site Core Client Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/db.js"></script>
    <script src="../../assets/js/layout.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../../assets/js/firebase-auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (db.getCurrentUser()) {
                window.location.href = '../../index.html';
                return;
            }
            
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('login-error-msg');
            
            // Password toggle logic
            const toggleBtns = document.querySelectorAll('.password-toggle-btn');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const container = btn.closest('.password-input-container');
                    const input = container.querySelector('input');
                    const icon = btn.querySelector('.material-icons');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility_off';
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility';
                    }
                });
            });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;
                
                if (!email || !password) {
                    errorMsg.textContent = 'Please enter both email and password.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.textContent = 'Verifying...';
                errorMsg.style.display = 'none';
                
                try {
                    const auth = await window.firebaseAuthPromise;
                    
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    const uid = userCredential.user.uid;
                    
                    // Fetch profile from Firestore
                    let firestoreUser = null;
                    try {
                        const userDoc = await firebase.firestore().collection('users').doc(uid).get();
                        if (userDoc.exists) {
                            firestoreUser = userDoc.data();
                        }
                    } catch (firestoreErr) {
                        console.error("Firestore read failed, synchronizing locally:", firestoreErr);
                    }
                    
                    // Build local user representation
                    let localUser = {
                        id: uid,
                        name: firestoreUser ? firestoreUser.name : email.split('@')[0],
                        email: email,
                        role: firestoreUser ? firestoreUser.role : 'patient',
                        status: firestoreUser ? firestoreUser.status : 'active',
                        profile_photo: firestoreUser ? firestoreUser.profile_photo : ''
                    };
                    
                    // Sync to local mock database array
                    const localUsers = db.getUsers();
                    const existingIdx = localUsers.findIndex(u => u.email.toLowerCase() === email.toLowerCase() || u.id === uid);
                    if (existingIdx !== -1) {
                        localUsers[existingIdx] = { ...localUsers[existingIdx], ...localUser };
                    } else {
                        localUsers.push(localUser);
                    }
                    db.saveUsers(localUsers);
                    
                    sessionStorage.setItem('sh_current_user', JSON.stringify(localUser));
                    db.logActivity('Logged into the portal (Firebase)', localUser.id);
                    
                    setFlashMessage(`Welcome back, ${localUser.name}!`, 'success');
                    
                    let dashboardPath = 'pages/dashboard/patient.html';
                    if (localUser.role === 'admin') dashboardPath = 'pages/dashboard/admin.html';
                    else if (localUser.role === 'doctor') dashboardPath = 'pages/dashboard/doctor.html';
                    else if (localUser.role === 'pharmacist') dashboardPath = 'pages/dashboard/pharmacist.html';
                    
                    window.location.href = '../../' + dashboardPath;
                } catch (err) {
                    let errMsg = err.message;
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        errMsg = 'Invalid email or password.';
                    } else if (err.code === 'auth/invalid-email') {
                        errMsg = 'Please enter a valid email address.';
                    }
                    errorMsg.textContent = errMsg;
                    errorMsg.style.display = 'block';
                    
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        });
    </script>
</body>
</html>
