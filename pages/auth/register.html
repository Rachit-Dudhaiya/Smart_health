<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Smart Health</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/styles.css?v=1783530550932" />
</head>
<body data-path-prefix="../../">
    
    <div class="container auth-shell">
        <div class="auth-card" style="width: min(520px, 100%);">
            <p class="eyebrow">Create Account</p>
            <h1>Join Smart Health</h1>
            <p class="auth-subtitle">Get started with secure database and analytics tracking.</p>
            
            <div id="register-error-msg" class="auth-message auth-message-error" style="display: none;"></div>
            
            <form id="register-form" class="auth-form" novalidate>
                <label>
                    Full Name
                    <input type="text" id="register-name" placeholder="e.g. Sunita Devi" required />
                </label>
                
                <label>
                    Email Address
                    <input type="email" id="register-email" placeholder="you@example.com" required />
                </label>
                
                <label>
                    Password (Min 8 characters)
                    <div class="password-input-container" style="position: relative; width: 100%;">
                        <input type="password" id="register-password" placeholder="••••••••" required minlength="8" style="padding-right: 2.75rem;" />
                        <button type="button" class="password-toggle-btn" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-muted); display: flex; align-items: center; justify-content: center; padding: 4px;" aria-label="Toggle password visibility">
                            <span class="material-icons" style="font-size: 1.25rem;">visibility</span>
                        </button>
                    </div>
                </label>
                
                <label>
                    Confirm Password
                    <div class="password-input-container" style="position: relative; width: 100%;">
                        <input type="password" id="register-confirm" placeholder="••••••••" required minlength="8" style="padding-right: 2.75rem;" />
                        <button type="button" class="password-toggle-btn" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--color-text-muted); display: flex; align-items: center; justify-content: center; padding: 4px;" aria-label="Toggle password visibility">
                            <span class="material-icons" style="font-size: 1.25rem;">visibility</span>
                        </button>
                    </div>
                </label>
                
                <label>
                    Account Role Type
                    <select id="register-role" required>
                        <option value="patient">Patient (OPD / Queue)</option>
                        <option value="doctor">Facility Doctor (Roster)</option>
                        <option value="pharmacist">Pharmacist Staff (Inventory)</option>
                        <option value="admin">System Admin (All access)</option>
                    </select>
                </label>
                
                <button class="btn btn-primary btn-full" type="submit" style="margin-top: 0.5rem;">Register Now</button>
            </form>
            
            <p class="auth-link">Already registered? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <!-- Site Core Client Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/db.js"></script>
    <script src="../../assets/js/layout.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../../assets/js/firebase-auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (db.getCurrentUser()) {
                window.location.href = '../../index.html';
                return;
            }
            
            const form = document.getElementById('register-form');
            const errorMsg = document.getElementById('register-error-msg');
            
            // Password toggle logic
            const toggleBtns = document.querySelectorAll('.password-toggle-btn');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const container = btn.closest('.password-input-container');
                    const input = container.querySelector('input');
                    const icon = btn.querySelector('.material-icons');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility_off';
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility';
                    }
                });
            });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('register-name').value.trim();
                const email = document.getElementById('register-email').value.trim();
                const password = document.getElementById('register-password').value;
                const confirmPassword = document.getElementById('register-confirm').value;
                const role = document.getElementById('register-role').value;
                
                if (!name || !email || !password || !confirmPassword) {
                    errorMsg.textContent = 'Please fill in all fields.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                if (password.length < 8) {
                    errorMsg.textContent = 'Password must be at least 8 characters long.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                if (password !== confirmPassword) {
                    errorMsg.textContent = 'Passwords do not match.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating Account...';
                errorMsg.style.display = 'none';
                
                try {
                    const auth = await window.firebaseAuthPromise;
                    let userToLogin;

                    if (auth) {
                        // Firebase path
                        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        const uid = userCredential.user.uid;
                        
                        const firestoreData = {
                            name: name,
                            email: email,
                            role: role,
                            status: 'active',
                            profile_photo: ''
                        };

                        try {
                            await firebase.firestore().collection('users').doc(uid).set(firestoreData);
                        } catch (firestoreErr) {
                            console.warn("Firestore user creation failed, will rely on local data for session.", firestoreErr);
                        }
                        
                        // Also create/update user in local DB for consistency
                        const localReg = db.register(name, email, password, role);
                        if(localReg.success) {
                            const users = db.getUsers();
                            const justRegistered = users.find(u => u.email.toLowerCase() === email.toLowerCase());
                            if (justRegistered) {
                                justRegistered.firebase_uid = uid;
                                db.saveUsers(users);
                            }
                        }

                        userToLogin = { id: uid, ...firestoreData };

                    } else {
                        // Local fallback path
                        console.warn("Firebase not available. Falling back to local-only registration.");
                        const res = db.register(name, email, password, role);
                        if (!res.success) {
                            throw new Error(res.message || 'Local registration failed.');
                        }
                        userToLogin = res.user;
                    }

                    // Login and redirect
                    sessionStorage.setItem('sh_current_user', JSON.stringify(userToLogin));
                    db.logActivity('Registered and logged in', userToLogin.id);
                    setFlashMessage(`Account created successfully! Welcome, ${name}!`, 'success');
                    window.location.href = `../dashboard/${role}.html`;

                } catch (err) {
                    let errMsg = err.message;
                    if (err.code === 'auth/email-already-in-use') {
                        errMsg = 'This email address is already registered.';
                    } else if (err.code === 'auth/invalid-email') {
                        errMsg = 'Please enter a valid email address.';
                    } else if (err.code === 'auth/weak-password') {
                        errMsg = 'Password is too weak. Please use a stronger password.';
                    }
                    errorMsg.textContent = errMsg;
                    errorMsg.style.display = 'block';
                    
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        });
    </script>
</body>
</html>
