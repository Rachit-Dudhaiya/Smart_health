<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Smart Health</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/styles.css" />
</head>
<body data-path-prefix="../../">
    
    <div class="container auth-shell">
        <div class="auth-card">
            <p class="eyebrow">Credentials</p>
            <h1>Reset Password</h1>
            <p class="auth-subtitle">Choose a strong, unique password to secure your medical records.</p>
            
            <div id="reset-error-msg" class="auth-message auth-message-error" style="display: none;"></div>
            
            <form id="reset-form" class="auth-form" style="display: none;" novalidate>
                <label>
                    New Password (Min 8 chars)
                    <input type="password" id="reset-password" placeholder="••••••••" required minlength="8" autofocus />
                </label>
                
                <label>
                    Confirm New Password
                    <input type="password" id="reset-confirm" placeholder="••••••••" required minlength="8" />
                </label>
                
                <button class="btn btn-primary btn-full" type="submit">Update Password</button>
            </form>
            
            <p class="auth-link"><a href="login.html">Back to Login</a></p>
        </div>
    </div>

    <!-- Site Core Client Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../../assets/js/db.js"></script>
    <script src="../../assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            const errorMsg = document.getElementById('reset-error-msg');
            const form = document.getElementById('reset-form');
            
            if (!token) {
                errorMsg.textContent = 'Token is missing or invalid.';
                errorMsg.style.display = 'block';
                return;
            }
            
            const users = db.getUsers();
            const user = users.find(u => u.reset_token === token && new Date(u.reset_token_expires) > new Date());
            
            if (!user) {
                errorMsg.textContent = 'The reset link is invalid or has expired. Please request a new one.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Show form
            form.style.display = 'block';
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const password = document.getElementById('reset-password').value;
                const confirmPassword = document.getElementById('reset-confirm').value;
                
                if (!password || !confirmPassword) {
                    errorMsg.textContent = 'Please enter both password fields.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                if (password.length < 8) {
                    errorMsg.textContent = 'Password must be at least 8 characters long.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                if (password !== confirmPassword) {
                    errorMsg.textContent = 'Passwords do not match.';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                // Update password and clear token
                const idx = users.findIndex(u => u.id === user.id);
                if (idx !== -1) {
                    users[idx].password = password;
                    delete users[idx].reset_token;
                    delete users[idx].reset_token_expires;
                    db.saveUsers(users);
                    
                    db.logActivity('Password successfully reset via recovery token (Simulated)', user.id);
                    db.addNotification(user.id, '🔒 Your account password was successfully reset.');
                    
                    setFlashMessage('Password reset successful. Please login with your new credentials.', 'success');
                    window.location.href = 'login.html';
                } else {
                    errorMsg.textContent = 'Failed to reset password. User not found.';
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
